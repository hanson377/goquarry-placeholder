<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quarry</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #050505;
            color: #E0E0E0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
        }
        .contour-svg { width: 280px; height: 280px; }
        .brand-name {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #E0E0E0;
        }
        .footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <svg class="contour-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <path d="M 40,100 C 40,60 70,30 100,30 C 140,30 170,60 170,100 C 170,140 140,170 100,170 C 70,170 40,140 40,100 Z" fill="none" stroke="#E0E0E0" stroke-width="1" opacity="0.9"/>
            <path d="M 55,100 C 55,70 75,45 100,45 C 130,45 155,70 155,100 C 155,130 130,155 100,155 C 75,155 55,130 55,100 Z" fill="none" stroke="#E0E0E0" stroke-width="1" opacity="0.8"/>
            <path d="M 70,100 C 70,80 85,60 100,60 C 120,60 140,80 140,100 C 140,120 120,140 100,140 C 85,140 70,120 70,100 Z" fill="none" stroke="#E0E0E0" stroke-width="1" opacity="0.7"/>
            <path d="M 85,100 C 85,90 92,80 100,80 C 110,80 120,90 120,100 C 120,110 110,120 100,120 C 92,120 85,110 85,100 Z" fill="none" stroke="#E0E0E0" stroke-width="1" opacity="0.6"/>
            <circle cx="100" cy="100" r="2" fill="#E0E0E0" opacity="0.5"/>
        </svg>
        <div class="brand-name">Quarry</div>
    </div>
    <div class="footer">goquarry.ai</div>
</body>
</html>
